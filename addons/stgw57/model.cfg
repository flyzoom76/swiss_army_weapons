// model.cfg for StGw57
// Defines LOD (Level of Detail) structure for the rifle model
// The .p3d file must be generated from stgw57_rifle.fbx using Object Builder or Blender DayZ Tools

class CfgSkeletons
{
    class StGw57_Skeleton
    {
        isDiscrete = 1;
        skeletonInherit = "";
        skeletonBones[] =
        {
            // No animated bones for static display model
        };
    };
};

class CfgModels
{
    class Default {};

    class StGw57_Rifle : Default
    {
        sectionsInherit = "";
        sections[] = {"Glass"};
        skeletonName = "StGw57_Skeleton";

        class Animations {};
    };
};
